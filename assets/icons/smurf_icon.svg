<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">

  <!-- Phrygian cap — tip droops left -->
  <path d="M4 4
           C3.5 2.5 5 0.5 7.5 0
           C6.5 1.2 6 2.8 6.5 4
           Z" fill="white"/>
  <path d="M4 4
           C4.5 1.8 7.5 0.4 10 0.4
           C12.5 0.4 15 1.8 16 4
           Z" fill="white"/>
  <ellipse cx="10" cy="4" rx="6" ry="1.3" fill="white"/>

  <!-- Ears (behind head) -->
  <ellipse cx="5.2"  cy="8.5" rx="1.6" ry="1.9" fill="#2b7fd4"/>
  <ellipse cx="14.8" cy="8.5" rx="1.6" ry="1.9" fill="#2b7fd4"/>

  <!-- Big round head -->
  <circle cx="10" cy="8.5" r="4.5" fill="#2b7fd4"/>

  <!-- Eyes -->
  <circle cx="8.2"  cy="8"   r="1.4" fill="white"/>
  <circle cx="11.8" cy="8"   r="1.4" fill="white"/>
  <circle cx="8.4"  cy="8.2" r="0.85" fill="#1e8be0"/>
  <circle cx="12.0" cy="8.2" r="0.85" fill="#1e8be0"/>
  <circle cx="8.4"  cy="8.2" r="0.45" fill="#0a0a18"/>
  <circle cx="12.0" cy="8.2" r="0.45" fill="#0a0a18"/>
  <circle cx="8.1"  cy="7.85" r="0.22" fill="white"/>
  <circle cx="11.7" cy="7.85" r="0.22" fill="white"/>

  <!-- Bulbous nose -->
  <circle cx="10" cy="9.8" r="0.9" fill="#1f6baf"/>

  <!-- Smile -->
  <path d="M8.2 11 Q10 12.5 11.8 11"
        stroke="#0a0a18" stroke-width="0.65" fill="none" stroke-linecap="round"/>

  <!-- Tiny body -->
  <ellipse cx="10" cy="15.8" rx="2.2" ry="2.6" fill="#2b7fd4"/>

  <!-- White pants -->
  <ellipse cx="10" cy="17"   rx="2.0" ry="2.0" fill="white"/>

  <!-- Big round shoes -->
  <ellipse cx="7.5"  cy="19.3" rx="3.0" ry="0.85" fill="white"/>
  <ellipse cx="12.5" cy="19.3" rx="3.0" ry="0.85" fill="white"/>

  <!-- Arms -->
  <ellipse cx="6.5"  cy="15.4" rx="1.9" ry="0.75"
           transform="rotate(-25 6.5 15.4)"  fill="#2b7fd4"/>
  <ellipse cx="13.5" cy="15.4" rx="1.9" ry="0.75"
           transform="rotate(25 13.5 15.4)"  fill="#2b7fd4"/>

</svg>
